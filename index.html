    <script type="module" src="assets/js/globe/index.js?v=5"></script>
    <script>
      window.LANCUN_globeInitState = 'pending';
      document.addEventListener('DOMContentLoaded', function () {
        if (document.body.dataset.page !== 'home') return;
        window.setTimeout(function () {
          var state = window.LANCUN_globeInitState;
          if (
            window.LANCUN_homeGlobe ||
            state === 'ready' ||
            state === 'failed' ||
            state === 'booting'
          ) {
            return;
          }
          var status = document.querySelector('[data-globe-status]');
          if (!status || !status.hidden) return;
          status.hidden = false;
          if (location.protocol === 'file:') {
            status.textContent =
              '3D 地球未能加载：file:// 协议会拦截 ES 模块。请运行 serve.ps1 后打开 http://127.0.0.1:8080/index.html';
          } else if (state === 'pending') {
            status.textContent =
              '地球脚本未加载。请打开开发者工具 → Network，检查 assets/js/globe/index.js 是否有 404。';
          } else {
            status.textContent =
              '地球初始化超时。请确认浏览器支持 WebGL，打开控制台查看报错后刷新。';
          }
        }, 12000);
      });
    </script>
    <script src="assets/js/utils/authStorage.js" defer></script>
    <script src="assets/js/utils/accountMenuStats.js" defer></script>
    <script src="assets/js/user-menu-html.js" defer></script>
    <script src="assets/js/app.js" defer></script>

          <div class="ocean-explore__inner">

                  <div class="ocean-explore__actions">

                  <code>http://127.0.0.1:8080/index.html</code>。
